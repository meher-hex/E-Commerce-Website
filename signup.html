<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="signup-pg">
        <p class="shop-name">Tulip Town</p>
    <div class="pg">
        <div class="left-side">
            <p class="big-txt">thank you for signing up!</p>
            <p class="small-txt">Hope you have a great time!</p>
        </div>
        <div class="sign-up-form">
            <p class="to-do">Create an account</p>
            <form action="">
                <div class="name">
                    <label for="naam">Name</label>
                    <input type="text" id="naam" />
                </div>
                <div class="email">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" />
                </div>
                <div class="pass">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" />
                </div>
                <div class="ph-num">
                    <label for="ph-num">Phone Number</label>
                    <input type="text" id="ph-num" />
                </div>
    
                <button type="submit" class="sign-up">Sign Up</button>
            </form>
        </div>
    </div>
    </div>
</body>
</html>
